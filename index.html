<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://kit.fontawesome.com/e4cdf3e801.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>

<body>
    <div class="registration-form-container p-3">
        <div class="container">
            <div class="row">
                <div class="col-12 col-md-6 ">
                    <h1 class=" text-center mb-4">Registration Form</h1>
                    <div class="mb-3">
                        <label for="fullName">Name</label>
                        <input type="text" class="form-control mt-1" id="fullName">
                    </div>
                    <div class="error" id="errFullName"></div>

                    <div class="mb-3">
                        <label for="email">Email</label>
                        <input type="text" class="form-control mt-1" id="email">
                    </div>
                    <div class="error" id="errEmail"></div>

                    <div class="mb-3">
                        <label>Working Status</label>
                        <select class="form-control mt-1">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>

                    <div>
                        <label for="" class="mb-1">Gender: </label>
                        <br>
                        <input type="radio" id="genderMale" name="gender">
                        <label for="genderMale">Male</label>
                        <input type="radio" id="genderfemale" name="gender">
                        <label for="genderfemale">Female</label>
                    </div>
                    <button id="submitBtn" class="btn btn-primary mt-4">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
